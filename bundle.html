  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ===== LOGIN SCREEN ===== */
.login-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #fff;
  border-radius: 20px;
  padding: 3rem 2rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  margin-top: 4rem;
}
.login-logo {
  font-size: 4rem;
  margin-bottom: 0.5rem;
}
.login-subtitle {
  color: #888;
  margin-bottom: 2rem;
  font-size: 0.95rem;
}
#login-form {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
#login-input {
  width: 100%;
  padding: 0.85rem 1rem;
  font-size: max(1rem, 16px);
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  outline: none;
  text-align: center;
  letter-spacing: 0.1em;
  transition: border-color 0.2s;
}
#login-input:focus {
  border-color: #6c63ff;
}
#login-form button {
  width: 100%;
  padding: 0.85rem;
  font-size: 1rem;
  font-weight: 600;
  background: #6c63ff;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
}
#login-form button:hover {
  background: #574fd6;
}
.login-error {
  text-align: center;
  color: #e53e3e;
  font-size: 0.9rem;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f5;
  color: #333;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 2rem 1rem;
}

#app {
  width: 100%;
  max-width: 500px;
}

h1 {
  text-align: center;
  font-size: 1.6rem;
  margin-bottom: 1.5rem;
  color: #222;
}

h2 {
  text-align: center;
  font-size: 1.2rem;
  margin-bottom: 1rem;
  color: #555;
}

/* ===== HOME SCREEN ===== */
.stats {
  display: flex;
  justify-content: space-around;
  margin-bottom: 2rem;
}

.stat-box {
  text-align: center;
  background: #fff;
  border-radius: 12px;
  padding: 1rem 1.5rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  min-width: 100px;
}

.stat-number {
  font-size: 2rem;
  font-weight: 700;
  color: #2563eb;
}

.stat-label {
  font-size: 0.8rem;
  color: #888;
  margin-top: 0.25rem;
}

.btn {
  display: block;
  width: 100%;
  padding: 1rem;
  border: none;
  border-radius: 12px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

.btn:active {
  transform: scale(0.98);
}

.btn-primary {
  background: #2563eb;
  color: #fff;
}

.btn-primary:hover {
  background: #1d4ed8;
}

.btn-secondary {
  background: #e5e7eb;
  color: #333;
  margin-top: 0.75rem;
}

.btn-secondary:hover {
  background: #d1d5db;
}

/* ===== LEVEL BREAKDOWN ===== */
.level-breakdown {
  background: #fff;
  border-radius: 12px;
  padding: 1.25rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  margin-bottom: 1.5rem;
}

.level-breakdown h2 {
  margin-bottom: 0.75rem;
}

.level-table {
  width: 100%;
}

.level-row {
  display: flex;
  justify-content: space-between;
  padding: 0.4rem 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 0.9rem;
  color: #555;
}

.level-row:last-child {
  border-bottom: none;
}

.level-header {
  font-weight: 600;
  color: #333;
  border-bottom: 2px solid #e5e7eb;
  padding-bottom: 0.5rem;
  margin-bottom: 0.25rem;
}

.level-row span {
  flex: 1;
}

.level-row span:last-child {
  text-align: right;
  flex: 0 0 50px;
}

.level-row span:nth-child(2) {
  text-align: center;
}

.level-count {
  font-weight: 600;
  color: #2563eb;
}

/* ===== FLASHCARD SCREEN ===== */
.progress-bar-container {
  background: #e5e7eb;
  border-radius: 8px;
  height: 8px;
  margin-bottom: 1.5rem;
  overflow: hidden;
}

.progress-bar {
  background: #2563eb;
  height: 100%;
  border-radius: 8px;
  transition: width 0.3s ease;
}

.progress-text {
  text-align: center;
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 0.5rem;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 2.5rem 2rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  text-align: center;
  margin-bottom: 1.5rem;
}

.word-pl {
  font-size: 2rem;
  font-weight: 700;
  color: #111;
  margin-bottom: 0.5rem;
}

.word-hint {
  font-size: 0.85rem;
  color: #aaa;
  margin-bottom: 1.5rem;
}

.input-group {
  display: flex;
  gap: 0.5rem;
}

.input-answer {
  flex: 1;
  padding: 0.85rem 1rem;
  border: 2px solid #e5e7eb;
  border-radius: 10px;
  font-size: 1.1rem;
  outline: none;
  transition: border-color 0.2s;
  /* iOS: font-size must be >=16px to prevent auto-zoom on focus */
  font-size: max(1rem, 16px);
}

.input-answer:focus {
  border-color: #2563eb;
}

.btn-submit {
  padding: 0.85rem 1.5rem;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: #fff;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
}

.btn-submit:hover {
  background: #1d4ed8;
}

/* ===== FEEDBACK ===== */
.feedback {
  text-align: center;
  padding: 1.5rem;
  border-radius: 12px;
  margin-bottom: 1rem;
  animation: fadeIn 0.3s ease;
}

.feedback-correct {
  background: #dcfce7;
  color: #166534;
}

.feedback-typo {
  background: #fef9c3;
  color: #854d0e;
}

.feedback-wrong {
  background: #fee2e2;
  color: #991b1b;
}

.feedback-icon {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
}

.feedback-text {
  font-size: 1rem;
  margin-bottom: 0.25rem;
}

.feedback-answer {
  font-size: 1.2rem;
  font-weight: 700;
}

/* ===== SUMMARY SCREEN ===== */
.summary-card {
  background: #fff;
  border-radius: 16px;
  padding: 2rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  margin-bottom: 1.5rem;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 0.75rem 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 1rem;
}

.summary-row:last-child {
  border-bottom: none;
}

.summary-correct {
  color: #166534;
  font-weight: 600;
}

.summary-typo {
  color: #854d0e;
  font-weight: 600;
}

.summary-wrong {
  color: #991b1b;
  font-weight: 600;
}

.summary-score {
  text-align: center;
  font-size: 3rem;
  font-weight: 700;
  margin: 1rem 0;
}

.summary-score-label {
  text-align: center;
  color: #888;
  font-size: 0.9rem;
  margin-bottom: 1rem;
}

/* ===== WORD LIST IN SUMMARY ===== */
.word-result {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5rem 0;
  font-size: 0.9rem;
  border-bottom: 1px solid #f5f5f5;
}

.word-result:last-child {
  border-bottom: none;
}

.word-result-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-right: 0.75rem;
}

.dot-correct { background: #22c55e; }
.dot-typo { background: #eab308; }
.dot-wrong { background: #ef4444; }

/* ===== SYNC INDICATOR ===== */
.sync-indicator {
  text-align: center;
  font-size: 0.8rem;
  color: #888;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
}

.sync-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.sync-off { background: #d1d5db; }
.sync-syncing { background: #f59e0b; animation: pulse 1s infinite; }
.sync-ok { background: #22c55e; }
.sync-error { background: #ef4444; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.screen {
  animation: fadeIn 0.3s ease;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 400px) {
  .word-pl { font-size: 1.5rem; }
  .stat-box { padding: 0.75rem 1rem; min-width: 80px; }
  .stat-number { font-size: 1.5rem; }
}

/* ===== SYNC SPINNER ===== */
.sync-spinner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  gap: 1.25rem;
  color: #666;
}
.spinner-ring {
  width: 48px;
  height: 48px;
  border: 5px solid #e0e0e0;
  border-top-color: #6c63ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

const INTERVALS = [0, 1, 3, 7, 14, 30, 90, 180, 730]; // days per level

const STORAGE_KEY = 'vocab_progress';
const SYNC_URL_KEY = 'vocab_sync_url';
const SYNC_TOKEN_KEY = 'vocab_sync_token';

// ===== ACCESS PASSWORD =====

let progress = {};

let syncUrl = localStorage.getItem(SYNC_URL_KEY) || '';
let syncToken = localStorage.getItem(SYNC_TOKEN_KEY) || '';
let syncStatus = 'idle'; // 'idle' | 'syncing' | 'ok' | 'error'

// ===== DATA =====
function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

// ===== GOOGLE SHEETS SYNC =====
function getSyncUrl() {
  return localStorage.getItem(SYNC_URL_KEY) || '';
}

function setSyncUrl(url) {
  syncUrl = url;
  if (url) {
    localStorage.setItem(SYNC_URL_KEY, url);
  } else {
    localStorage.removeItem(SYNC_URL_KEY);
  }
}

function getSyncToken() {
  return localStorage.getItem(SYNC_TOKEN_KEY) || '';
}

function setSyncToken(token) {
  syncToken = token;
  if (token) {
    localStorage.setItem(SYNC_TOKEN_KEY, token);
  } else {
    localStorage.removeItem(SYNC_TOKEN_KEY);
  }
}

async function pullFromSheets() {
  if (!syncUrl) return null;
  syncStatus = 'syncing';
  updateSyncIndicator();
  try {
    const sep = syncUrl.includes('?') ? '&' : '?';
    const resp = await fetch(syncUrl + sep + 'token=' + encodeURIComponent(syncToken));
    const data = await resp.json();
    if (data.ok) {
      syncStatus = 'ok';
      updateSyncIndicator();
      return data.progress;
    }
    syncStatus = 'error';
    updateSyncIndicator();
    return null;
  } catch {
    syncStatus = 'error';
    updateSyncIndicator();
    return null;
  }
}

async function pushToSheets(changedIds) {
  if (!syncUrl) return;
  const subset = {};
  for (const id of changedIds) {
    if (progress[id]) subset[id] = progress[id];
  }
  if (Object.keys(subset).length === 0) return;
  syncStatus = 'syncing';
  updateSyncIndicator();
  try {
    await fetch(syncUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ token: syncToken, progress: subset })
    });
    syncStatus = 'ok';
  } catch {
    syncStatus = 'error';
  }
  updateSyncIndicator();
}

function updateSyncIndicator() {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  if (!syncUrl) {
    el.innerHTML = '<span class="sync-dot sync-off"></span> Offline';
    return;
  }
  if (syncStatus === 'syncing') {
    el.innerHTML = '<span class="sync-dot sync-syncing"></span> Synchronizuję...';
  } else if (syncStatus === 'ok') {
    el.innerHTML = '<span class="sync-dot sync-ok"></span> Zsynchronizowano';
  } else if (syncStatus === 'error') {
    el.innerHTML = '<span class="sync-dot sync-error"></span> Błąd synchronizacji';
  } else {
    el.innerHTML = '<span class="sync-dot sync-off"></span> Offline';
  }
}

// ===== LEVENSHTEIN =====
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(
        dp[i - 1][j] + 1,
        dp[i][j - 1] + 1,
        dp[i - 1][j - 1] + cost
      );
    }
  }
  return dp[m][n];
}

function normalize(s) {
  return s.trim().toLowerCase();
}

/**
 * Returns 'correct' | 'typo' | 'wrong'
 */
function checkAnswer(input, expected) {
  const a = normalize(input);
  const b = normalize(expected);
  if (a === b) return 'correct';
  if (levenshtein(a, b) <= 1) return 'typo';
  return 'wrong';
}

// ===== SPACED REPETITION =====
function getToday() {
  return new Date().toISOString().slice(0, 10);
}

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function advanceLevel(wordId, status) {
  const today = getToday();
  const entry = progress[wordId] || { level: 0, nextReview: today, lastReview: null };

  if (status === 'correct') {
    entry.level = Math.min(8, entry.level + 1);
  } else if (status === 'typo') {
    entry.level = Math.max(0, entry.level - 1);
  } else {
    // wrong — reset to 0
    entry.level = 0;
  }

  entry.nextReview = addDays(today, Math.max(1, INTERVALS[entry.level]));
  entry.lastReview = today;
  progress[wordId] = entry;
  saveProgress();
  pushToSheets([wordId]);
}

// ===== SESSION BUILDER =====
function buildSession(words, progress) {
  const today = getToday();

  const due = words.filter(w => {
    const p = progress[w.id];
    return p && p.nextReview <= today && p.level < 8;
  }).sort((a, b) => {
    return (progress[a.id].nextReview).localeCompare(progress[b.id].nextReview);
  });

  const newWords = words.filter(w => !progress[w.id]);

  const maxDue = Math.min(Math.ceil(SESSION_SIZE * DUE_RATIO), due.length);
  const maxNew = Math.min(SESSION_SIZE - maxDue, newWords.length);

  const selected = [
    ...due.slice(0, maxDue),
    ...newWords.slice(0, maxNew)
  ];

  // If still under 20 and there are more due words, fill with them
  if (selected.length < SESSION_SIZE && due.length > maxDue) {
    const extra = due.slice(maxDue, maxDue + SESSION_SIZE - selected.length);
    selected.push(...extra);
  }

  // Shuffle
  for (let i = selected.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [selected[i], selected[j]] = [selected[j], selected[i]];
  }

  return selected.slice(0, SESSION_SIZE);
}

// ===== STATS =====
function getStats() {
  const today = getToday();
  let dueCount = 0;
  let learnedCount = 0;
  let masteredCount = 0;

  for (const w of allWords) {
    const p = progress[w.id];
    if (!p) continue;
    if (p.level >= 8) {
      masteredCount++;
    } else if (p.nextReview <= today) {
      dueCount++;
    }
    learnedCount++;
  }

  const newCount = allWords.length - learnedCount;

  // Per-level counts
  const levelCounts = new Array(9).fill(0);
  for (const w of allWords) {
    const p = progress[w.id];
    if (p) {
      levelCounts[p.level]++;
    }
  }

  return { dueCount, newCount, masteredCount, total: allWords.length, levelCounts };
}

function startSession() {
  session = buildSession(allWords, progress);
  if (session.length === 0) {
    renderHome();
    return;
  }
  currentIndex = 0;
  sessionResults = [];
  renderCard();
}

function renderCard() {
  const word = session[currentIndex];
  const pct = Math.round((currentIndex / session.length) * 100);

  app.innerHTML = `
    <div class="screen">
      <div class="progress-text">${currentIndex + 1} / ${session.length}</div>
      <div class="progress-bar-container">
        <div class="progress-bar" style="width:${pct}%"></div>
      </div>
      <div class="card">
        <div class="word-pl">${escapeHtml(word.pl)}</div>
        <div class="word-hint">Wpisz tłumaczenie po angielsku</div>
        <div class="input-group">
          <input type="text" class="input-answer" id="input-answer" autocomplete="off" autofocus>
          <button class="btn-submit" id="btn-check">→</button>
        </div>
      </div>
    </div>
  `;

  const input = document.getElementById('input-answer');
  const btnCheck = document.getElementById('btn-check');

  input.focus();

  const submit = () => {
    const answer = input.value;
    if (!answer.trim()) return;
    const status = checkAnswer(answer, word.en);
    sessionResults.push({ wordId: word.id, status, userAnswer: answer, correctAnswer: word.en, pl: word.pl });
    advanceLevel(word.id, status);
    renderFeedback(word, status, answer);
  };

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submit();
  });
  btnCheck.addEventListener('click', submit);
}

function renderFeedback(word, status, userAnswer) {
  let icon, cls, text;
  if (status === 'correct') {
    icon = '✓';
    cls = 'feedback-correct';
    text = 'Poprawnie!';
  } else if (status === 'typo') {
    icon = '~';
    cls = 'feedback-typo';
    text = 'Literówka — cofam o 1 poziom';
  } else {
    icon = '✗';
    cls = 'feedback-wrong';
    text = 'Źle — resetuję poziom';
  }

  app.innerHTML = `
    <div class="screen">
      <div class="progress-text">${currentIndex + 1} / ${session.length}</div>
      <div class="feedback ${cls}">
        <div class="feedback-icon">${icon}</div>
        <div class="feedback-text">${text}</div>
        <div class="feedback-answer">${escapeHtml(word.en)}</div>
        ${status !== 'correct' ? `<div class="feedback-text" style="margin-top:0.5rem;">Twoja odpowiedź: <strong>${escapeHtml(userAnswer)}</strong></div>` : ''}
      </div>
    </div>
  `;

  setTimeout(() => {
    currentIndex++;
    if (currentIndex < session.length) {
      renderCard();
    } else {
      renderSummary();
    }
  }, status === 'correct' ? 1000 : 2000);
}

function renderSummary() {
  const correct = sessionResults.filter(r => r.status === 'correct').length;
  const typos = sessionResults.filter(r => r.status === 'typo').length;
  const wrong = sessionResults.filter(r => r.status === 'wrong').length;

  const wordRows = sessionResults.map(r => {

    return `

          <span>${escapeHtml(r.pl)}</span>

// ===== UTILS =====
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== INIT =====
async function init() {
  const app = document.getElementById('app');
  progress = loadProgress();
  try {
    allWords = await loadWords();
  } catch {
    app.innerHTML = '<p style="text-align:center;color:red;padding:2rem;">Nie udało się załadować słówek.</p>';
    return;
  }

  // Always sync on load if configured — show spinner while waiting
  if (syncUrl) {
    app.innerHTML = `
      <div class="sync-spinner">
        <div class="spinner-ring"></div>
        <span>Synchronizacja postępu…</span>
      </div>`;
    const remote = await pullFromSheets();
    if (remote) {
      for (const [id, entry] of Object.entries(remote)) {
        const local = progress[id];
        if (!local || !local.lastReview || (entry.lastReview && entry.lastReview >= local.lastReview)) {
          progress[id] = entry;
        }
      }
      saveProgress();
    }
  }

  renderHome();
}

      sessionStorage.setItem(AUTH_KEY, '1');
      init();
    } else {
      const err = document.getElementById('login-error');
      err.hidden = false;
      document.getElementById('login-input').value = '';
      document.getElementById('login-input').focus();
    }
  });
}

if (isAuthenticated()) {
  init();
} else {
  renderLogin();
}

</script>
</body>
</html>
